name: flutter_release_manager
description: >-
  Build, package, and distribute Flutter APK and IPA releases with a single command.
  Upload to Google Drive and Diawi automatically with guided setup and zero
  Google Cloud configuration.
version: 1.0.0
homepage: https://github.com/Muhammad-Shadab/flutter_release_manager
repository: https://github.com/Muhammad-Shadab/flutter_release_manager
issue_tracker: https://github.com/Muhammad-Shadab/flutter_release_manager/issues

topics:
  - flutter
  - release
  - deployment
  - automation
  - distribution

executables:
  flutter_release_manager:

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  args: ^2.5.0
  http: ^1.2.0

dev_dependencies:
  lints: ^4.0.0
